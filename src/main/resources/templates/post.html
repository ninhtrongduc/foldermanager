<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm bài viết - Quản lý nội dung</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/foldermanager.css">
    <link rel="stylesheet" href="/css/post.css">
    <!-- SUNEDITOR -->
    <!-- Nhúng CSS từ thư mục static/suneditor/ -->
    <link href="/suneditor/suneditor.min.css" rel="stylesheet">
    <script src="/suneditor/suneditor.min.js"></script>
    <!-- SUNEDITOR -->
</head>

<body>

    <div class="file-manager-container">
        <header class="top-section">
            <div class="folder-title">
                <i class="fa-solid fa-file-signature folder-icon-modern"></i>
                <h2 style="font-size: 20px; font-weight: 600; color: var(--text-dark);">Thêm bài viết</h2>
            </div>
            <div class="btn-header-group">
                <button class="btn btn-primary" style="background: var(--primary);"><i
                        class="fa-solid fa-paper-plane"></i> Đăng</button>
                <button class="btn" style="background: var(--danger); color: white;"><i class="fa-solid fa-ban"></i> Hủy</button>
            </div>
        </header>

        <div class="file-scroll-area">
            <div class="post-form-container">
                <div class="form-card">
                    <div class="input-grid">
                        <!-- HÀNG 1 -->
                        <div class="input-group">
                            <i class="fa-solid fa-file"></i>
                            <input type="text" class="input-field" placeholder="Tên bài viết">
                        </div>
                    
                        <div class="input-group">
                            <i class="fa-solid fa-link"></i>
                            <input type="text" class="input-field" placeholder="ten-url-bai-viet">
                        </div>
                    
                        <!-- HÀNG 2: Danh sách chuyên mục và Tin tiêu điểm sẽ nằm ở đây -->
                        <div class="input-group">
                            <i class="fa-solid fa-layer-group"></i>
                            <select class="input-field" style="padding-left: 42px;">
                                <option value="">Danh sách chuyên mục</option>
                            </select>
                        </div>
                    
                        <div class="checkbox-group" style="display: flex; align-items: center; height: 100%;">
                            <input type="checkbox" id="is_featured">
                            <label for="is_featured" style="margin-bottom: 0; margin-left: 10px; cursor: pointer;">
                                Tin tiêu điểm <i class="fa-solid fa-star" style="color: #ffb100;"></i>
                            </label>
                        </div>
                    
                        <!-- HÀNG 3 -->
                        <div class="input-group">
                            <i class="fa-solid fa-user-pen"></i>
                            <input type="text" class="input-field" placeholder="Tác giả">
                        </div>
                    
                        <div class="input-group">
                            <i class="fa-solid fa-calendar-check"></i>
                            <input type="text" id="publish-date" class="input-field" placeholder="Ngày đăng" readonly>
                        </div>
                    </div>
                </div>

                <!-- RICH TEXT EDITOR -->
                <div class="form-card">
                    <!-- Textarea này sẽ là nơi SunEditor xuất hiện -->
                    <textarea id="sun_editor_container" name="content">
                        Bắt đầu viết nội dung bài viết của bạn tại đây...
                    </textarea>
                </div>
                <!-- RICH TEXT EDITOR -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // --- Khởi tạo Date / Time hiện hành ---
            const publishDateInput = document.getElementById('publish-date');
            if (publishDateInput) {
                const now = new Date();

                // Định dạng: DD/MM/YYYY HH:mm (Ví dụ: 06/05/2026 15:30)
                const formattedDate = now.toLocaleDateString('vi-VN', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                }) + ' ' + now.toLocaleTimeString('vi-VN', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                publishDateInput.value = formattedDate;
            }
            
            // --- Khởi tạo SunEditor ---
            const sunEditorElement = document.getElementById('sun_editor_container');
            
            if (sunEditorElement) {
                try {
                    const editor = SUNEDITOR.create(sunEditorElement, {
                        width: '100%',
                        height: '400px',
                        plugins: SUNEDITOR.plugins,
                        buttonList: [
                            ['undo', 'redo'],
                            ['font', 'fontSize', 'blockStyle'],
                            ['paragraphStyle', 'blockquote'],
                            ['bold', 'underline', 'italic', 'strike', 'subscript', 'superscript'],
                            ['fontColor', 'backgroundColor', 'textStyle'],
                            ['removeFormat'],
                            '/', // Xuống dòng cho thanh công cụ
                            ['outdent', 'indent'],
                            ['align', 'hr', 'list', 'lineHeight'],
                            ['table', 'link', 'image', 'video', 'audio'],
                            ['fullScreen', 'showBlocks', 'codeView'],
                            ['preview', 'print'],
                            ['save', 'template']
                        ],
                        // Đảm bảo tiếng Việt cho Editor nếu cần (tùy build của bạn)
                        // lang: SUNEDITOR_LANG.en 
                    });
                    console.log("SunEditor initialized successfully!");
                } catch (error) {
                    console.error("SunEditor initialization error:", error);
                }
            } else {
                console.error("Target element 'sun_editor_container' not found!");
            }
        });
    </script>

</body>

</html>
