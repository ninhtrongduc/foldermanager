<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Web File Manager</title>
    <link rel="stylesheet" href="/css/foldermanager.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        /* Thêm một chút CSS để bổ trợ cho việc đóng mở */
        .nav-sub-group {
            display: none;
        }

        .nav-item.expanded>.nav-sub-group {
            display: block;
        }

        .nav-row.active {
            background: #eff6ff !important;
            color: #2563eb !important;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="file-manager-container">
        <header class="top-section">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search files & folders...">
            </div>

            <div class="create-folder-group">
                <input type="text" class="input-folder-name" placeholder="Hãy nhập tên thư mục cần tạo">
                <button class="btn btn-light-blue">
                    <i class="fa-solid fa-folder-plus"></i> Create Folder
                </button>
                <button class="btn btn-primary"><i class="fa-solid fa-upload"></i> Upload</button>
            </div>
        </header>

        <div class="main-content">
            <aside class="left-section">
                <div class="nav-container">
                    <div th:replace="~{::folderTree(${folders})}"></div>
                </div>
            </aside>

            <div th:fragment="folderTree(nodes)">
                <div th:each="node : ${nodes}" class="nav-item">
                    <div class="nav-row" th:attr="hx-get=@{/folder/files(path=${node.relativePath})}"
                        hx-target="#file-display-area" hx-swap="innerHTML" onclick="toggleFolder(this)">

                        <i th:if="${node.children.size() > 0}" class="fa-solid fa-caret-right expand-icon"></i>
                        <i th:unless="${node.children.size() > 0}" class="fa-solid fa-caret-right expand-icon"
                            style="visibility: hidden;"></i>

                        <i class="fa-solid fa-folder folder-icon-modern"></i>
                        <span class="nav-label" th:text="${node.name}">Folder Name</span>
                        <span class="nav-badge" th:text="${node.fileCount}">0</span>
                    </div>

                    <div th:if="${node.children.size() > 0}" class="nav-sub-group">
                        <div th:replace="~{::folderTree(${node.children})}"></div>
                    </div>
                </div>
            </div>

            <main class="right-section" id="file-display-area">
                <div th:fragment="file-list-fragment" style="width: 100%; height: 100%;">
                    <div class="right-header">
                        <h2 class="folder-title" th:text="${currentFolder ?: 'Chọn thư mục'}">Tên Thư Mục</h2>
                        <span class="file-stats" th:text="${files != null ? files.size() + ' files' : '0 files'}"></span>
                    </div>
            
                    <div class="file-scroll-area">
                        <div class="file-grid">
                            <div th:each="file : ${files}" class="file-card">
                                <input type="checkbox" class="file-check">
                                <div class="file-icon"
                                    th:classappend="${file.name.endsWith('.docx') ? 'word' : (file.name.endsWith('.pdf') ? 'pdf' : 'text')}">
                                    <i
                                        th:class="${file.name.endsWith('.pdf') ? 'fa-solid fa-file-pdf' : 'fa-solid fa-file-lines'}"></i>
                                </div>
                                <div class="file-info">
                                    <span class="file-name" th:text="${file.name}">filename.ext</span>
                                    <span class="file-type" th:text="${file.name.contains('.') ? #strings.substringAfter(file.name, '.') : 'File'}">
                                        Type
                                    </span>
                                </div>
                            </div>
            
                            <div th:if="${files == null || files.isEmpty()}"
                                style="grid-column: 1/-1; text-align: center; padding: 40px; color: #94a3b8;">
                                <i class="fa-regular fa-folder-open"
                                    style="font-size: 48px; margin-bottom: 10px; display: block;"></i>
                                Thư mục này trống
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <footer class="bottom-section">
            <button class="btn btn-danger">
                <i class="fa-solid fa-trash-can"></i> Delete Selected Files
            </button>
        </footer>
    </div>

    <script>
        function toggleFolder(element) {
            // 1. Xử lý hiệu ứng Active màu sắc
            document.querySelectorAll('.nav-row').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // 2. Xử lý đóng mở folder con
            const parentItem = element.closest('.nav-item');
            const icon = element.querySelector('.expand-icon');

            if (parentItem.classList.contains('expanded')) {
                parentItem.classList.remove('expanded');
                if (icon) icon.className = 'fa-solid fa-caret-right expand-icon';
            } else {
                parentItem.classList.add('expanded');
                if (icon) icon.className = 'fa-solid fa-caret-down expand-icon';
            }
        }
    </script>
</body>

</html>
