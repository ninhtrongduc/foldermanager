<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLDER MANAGER</title>
    <link rel="stylesheet" href="/css/foldermanager.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- <style>
        
    </style> -->
</head>

<body>
    <div class="file-manager-container">
        <header class="top-section">
            <!-- <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search files & folders...">
            </div> -->
            <div class="delete-folder-zone">
                <!-- ĐÂY LÀ CHỨC NĂNG TẠO XÓA THƯ MỤC -->
                <button class="btn-delete-folder" id="btn-delete-folder" hx-delete="/folder/delete" hx-target="#folder-sidebar"
                    hx-confirm="Bạn có chắc muốn xóa thư mục này?" hx-vals='js:{path: getSelectedFolderPath()}'
                    style="display: none; background: none; border: none; color: #ef4444; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <i class="fa-solid fa-trash-can"></i>
                    <span style="font-weight: 600;">XÓA THƯ MỤC</span>
                </button>
            <!-- ĐÂY LÀ CHỨC NĂNG TẠO XÓA THƯ MỤC -->
            </div>
            <div class="create-folder-group">
                <input type="text" id="newFolderName" name="folderName" class="input-folder-name" placeholder="Tên thư mục mới...">
                <button class="btn btn-light-blue" hx-post="/folder/create" hx-include="#newFolderName" hx-target="#folder-sidebar"
                    onclick="return validateFolderName()">
                    <i class="fa-solid fa-folder-plus"></i> Create
                </button>
            
                <form hx-post="/folder/upload" hx-encoding="multipart/form-data" hx-trigger="change from:#fileInput"
                    hx-target="#file-display-area" hx-indicator="#loader" hx-vals='js:{path: getSelectedFolderPath()}'>
            
                    <input type="file" id="fileInput" name="files" multiple style="display: none;">
            
                    <button type="button" class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                        <i class="fa-solid fa-upload"></i> Upload
                    </button>
                </form>
            </div>
        </header>

        <div class="main-content">
            <aside class="left-section">
                <div class="nav-container" id="folder-sidebar">
                    <div th:replace="~{::folderTree(${folders})}"></div>
                </div>
            </aside>

            <main class="right-section" id="file-display-area">
                <div th:fragment="file-list-fragment" class="file-content-wrapper"
                    style="display: flex; flex-direction: column; height: 100%;">
                    <div class="right-header"
                        style="padding: 20px; border-bottom: 1px solid #e2e8f0; background: white;">
                        <div class="header-info">
                            <h2 class="folder-title">
                                <i class="fa-solid fa-folder-open" style="margin-right: 10px; color: #fbbf24;"></i>
                                <span th:text="${currentFolder ?: '/MEDIA/'}">Thư mục</span>
                            </h2>
                            <span class="file-stats">
                                <i class="fa-solid fa-circle-notch fa-spin htmx-indicator" id="loader"></i>
                                <span th:text="${files != null ? files.size() + ' tệp tin' : '0 tệp tin'}">Số lượng tệp tin</span>
                            </span>
                        </div>
                    </div>

                    <div class="file-scroll-area">
                        <div class="file-grid" id="file-grid">
                            <div th:each="file : ${files}" class="file-card">
                                <input type="checkbox" class="file-check" name="selectedFiles" th:value="${file.name}">

                                <div class="file-icon">
                                    <i th:if="${file.extension == 'jpg' || file.extension == 'png' || file.extension == 'gif' || file.extension == 'jpeg' || file.extension == 'webp'}"
                                        class="fa-solid fa-file-image icon-image"></i>

                                    <i th:if="${file.extension == 'mp4' || file.extension == 'mov' || file.extension == 'avi'}"
                                        class="fa-solid fa-file-video icon-video"></i>

                                    <i th:if="${file.extension == 'pdf'}" class="fa-solid fa-file-pdf icon-pdf"></i>

                                    <i th:if="${file.extension == 'xlsx' || file.extension == 'xls' || file.extension == 'csv'}"
                                        class="fa-solid fa-file-excel icon-excel"></i>

                                    <i th:if="${file.extension == 'docx' || file.extension == 'doc'}"
                                        class="fa-solid fa-file-word icon-doc"></i>

                                    <i th:if="${file.extension != 'jpg' && file.extension != 'png' && file.extension != 'gif' && file.extension != 'jpeg' && file.extension != 'webp' && file.extension != 'mp4' && file.extension != 'mov' && file.extension != 'avi' && file.extension != 'pdf' && file.extension != 'xlsx' && file.extension != 'xls' && file.extension != 'csv' && file.extension != 'docx' && file.extension != 'doc'}"
                                        class="fa-solid fa-file-lines icon-default"></i>
                                </div>

                                <div class="file-info">
                                    <span class="file-name" th:text="${file.name}">filename.ext</span>
                                    <span class="file-size" style="font-size: 0.75rem; color: #64748b;"
                                        th:text="${file.size}">0 KB</span>
                                </div>
                            </div>

                            <div th:if="${files == null || files.isEmpty()}"
                                style="text-align: center; padding: 60px; color: #94a3b8; grid-column: 1/-1;">
                                <i class="fa-regular fa-folder-open" style="font-size: 64px; opacity: 0.5;"></i>
                                <p>Thư mục này không có tệp tin nào</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <footer class="bottom-section">
            <button class="btn btn-danger" hx-delete="/folder/files/delete-selected" hx-include=".file-check:checked"
                hx-vals='js:{path: getSelectedFolderPath()}' hx-target="#file-display-area"
                hx-confirm="Bạn có chắc chắn muốn xóa các tệp đã chọn?">
                <i class="fa-solid fa-trash-can"></i> Xóa tệp tin
            </button>
        </footer>
    </div>

    <div th:fragment="folderTree(nodes)">
        <div th:each="node : ${nodes}" class="nav-item">
            <div class="nav-row" th:attr="hx-get=@{/folder/files(path=${node.relativePath})}"
                hx-target="#file-display-area" hx-swap="innerHTML" hx-trigger="click" hx-indicator="#loader"
                onclick="handleFolderClick(this)">

                <i th:if="${node.children != null && node.children.size() > 0}"
                    class="fa-solid fa-caret-right expand-icon"></i>
                <i th:unless="${node.children != null && node.children.size() > 0}"
                    class="fa-solid fa-caret-right expand-icon" style="visibility: hidden;"></i>

                <i class="fa-solid fa-folder folder-icon-modern"></i>
                <span class="nav-label" th:text="${node.name}">Folder Name</span>
                <span class="nav-badge" th:text="${node.fileCount}">0</span>
            </div>

            <div th:if="${node.children != null && node.children.size() > 0}" class="nav-sub-group">
                <div th:replace="~{::folderTree(${node.children})}"></div>
            </div>
        </div>
    </div>

    <script src="/js/foldermanager.js"></script>
</body>

</html>
